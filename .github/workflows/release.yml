name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-arm:
    name: Build macOS ARM DMG
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name != '' && github.ref_name || '1.0.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize version
        shell: bash
        run: echo "APP_VERSION=${APP_VERSION#v}" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build ARM DMG
        run: ./gradlew clean packageDmg

      - name: Rename ARM DMG
        shell: bash
        run: |
          shopt -s nullglob
          for file in build/compose/binaries/main/dmg/*.dmg; do
            mv "$file" "${file%.dmg}-macos-arm64.dmg"
          done

      - name: Upload macOS ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-dmg
          path: |
            build/compose/binaries/main/dmg/*.dmg

  build-macos-intel:
    name: Build macOS Intel DMG
    runs-on: macos-15-intel
    env:
      APP_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name != '' && github.ref_name || '1.0.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize version
        shell: bash
        run: echo "APP_VERSION=${APP_VERSION#v}" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build Intel DMG
        run: ./gradlew clean packageDmg

      - name: Rename Intel DMG
        shell: bash
        run: |
          shopt -s nullglob
          for file in build/compose/binaries/main/dmg/*.dmg; do
            mv "$file" "${file%.dmg}-macos-intel.dmg"
          done

      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-dmg
          path: |
            build/compose/binaries/main/dmg/*.dmg

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name != '' && github.ref_name || '1.0.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize version
        shell: pwsh
        run: |
          $normalized = $env:APP_VERSION
          if ($normalized.StartsWith("v")) {
            $normalized = $normalized.Substring(1)
          }
          "APP_VERSION=$normalized" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build MSI and EXE
        run: .\gradlew.bat clean packageMsi packageExe

      - name: Rename Windows installers
        shell: pwsh
        run: |
          Get-ChildItem -Path build/compose/binaries/main/msi/*.msi | ForEach-Object {
            Rename-Item $_.FullName ($_.BaseName + "-windows-x64" + $_.Extension)
          }
          Get-ChildItem -Path build/compose/binaries/main/exe/*.exe | ForEach-Object {
            Rename-Item $_.FullName ($_.BaseName + "-windows-x64" + $_.Extension)
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            build/compose/binaries/main/msi/*.msi
            build/compose/binaries/main/exe/*.exe

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-macos-arm
      - build-macos-intel
      - build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS ARM artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-arm-dmg
          path: artifacts/macos-arm

      - name: Download macOS Intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-intel-dmg
          path: artifacts/macos-intel

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos-arm/**/*.dmg
            artifacts/macos-intel/**/*.dmg
            artifacts/windows/**/*.msi
            artifacts/windows/**/*.exe
